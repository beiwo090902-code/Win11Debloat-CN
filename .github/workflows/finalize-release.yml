name: Finalize release assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rename assets and retarget release tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export LC_ALL=C.UTF-8

          tag="v2026.07.11-zh-CN.1"
          old_zip="Win11Debloat-CN-2026.07.11-zh-CN.1-.zip"
          new_zip="Win11Debloat-CN-2026.07.11-zh-CN.1-被窝.zip"
          old_sum="$old_zip.sha256"
          new_sum="$new_zip.sha256"
          expected_hash="f981312aff87273b4e2ab344a085eeb0b5e6caabcef752c0edfd5defb4ca0f7f"
          temp_dir="$RUNNER_TEMP/release-rename"
          mkdir -p "$temp_dir"

          has_asset() {
            gh release view "$tag" --json assets --jq '.assets[].name' | grep -Fxq "$1"
          }

          if has_asset "$new_zip"; then
            source_asset="$new_zip"
          else
            source_asset="$old_zip"
          fi
          gh release download "$tag" --pattern "$source_asset" --dir "$temp_dir"
          if [ "$source_asset" != "$new_zip" ]; then
            cp "$temp_dir/$source_asset" "$temp_dir/$new_zip"
          fi

          actual_hash="$(sha256sum "$temp_dir/$new_zip" | awk '{print $1}')"
          test "$actual_hash" = "$expected_hash"
          (cd "$temp_dir" && sha256sum "$new_zip" > "$new_sum")

          if ! has_asset "$new_zip"; then
            gh release upload "$tag" "$temp_dir/$new_zip"
          fi
          if ! has_asset "$new_sum"; then
            gh release upload "$tag" "$temp_dir/$new_sum"
          fi
          if has_asset "$old_zip"; then
            gh release delete-asset "$tag" "$old_zip" --yes
          fi
          if has_asset "$old_sum"; then
            gh release delete-asset "$tag" "$old_sum" --yes
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/finalize-release.yml
          git commit -m "Finalize v2026.07.11-zh-CN.1 release"
          git push origin HEAD:main
          git tag -f "$tag" HEAD
          git push --force origin "refs/tags/$tag"
