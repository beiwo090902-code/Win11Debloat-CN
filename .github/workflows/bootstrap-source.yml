name: Publish source tree and release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Unpack source and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          archive="$(find . -maxdepth 1 -type f -name 'Win11Debloat-CN-*.zip' -print -quit)"
          test -n "$archive"

          archive_name="$(basename "$archive")"
          release_dir="$RUNNER_TEMP/release"
          unpack_dir="$RUNNER_TEMP/unpacked"
          mkdir -p "$release_dir" "$unpack_dir"
          cp "$archive" "$release_dir/$archive_name"
          sha256sum "$release_dir/$archive_name" > "$release_dir/$archive_name.sha256"

          python3 - "$archive" "$unpack_dir" <<'PY'
          from pathlib import Path, PurePosixPath
          import shutil
          import sys
          import zipfile

          archive = Path(sys.argv[1])
          destination = Path(sys.argv[2]).resolve()
          with zipfile.ZipFile(archive) as zip_file:
              for entry in zip_file.infolist():
                  normalized = entry.filename.replace("\\", "/")
                  relative = PurePosixPath(normalized)
                  if relative.is_absolute() or ".." in relative.parts:
                      raise RuntimeError(f"Unsafe ZIP entry: {entry.filename}")
                  target = destination.joinpath(*relative.parts)
                  if entry.is_dir() or normalized.endswith("/"):
                      target.mkdir(parents=True, exist_ok=True)
                      continue
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with zip_file.open(entry) as source, target.open("wb") as output:
                      shutil.copyfileobj(source, output)
          PY

          source_root="$(find "$unpack_dir" -mindepth 1 -maxdepth 1 -type d -print -quit)"
          test -n "$source_root"
          cp -a "$source_root"/. "$GITHUB_WORKSPACE"/
          rm -rf "$unpack_dir"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          if ! git diff --cached --quiet; then
            git commit -m "Publish Win11Debloat-CN 2026.07.11-zh-CN.1"
            git push origin HEAD:main
          fi

          tag="v2026.07.11-zh-CN.1"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$release_dir/$archive_name" "$release_dir/$archive_name.sha256" --clobber
          else
            gh release create "$tag" "$release_dir/$archive_name" "$release_dir/$archive_name.sha256" --target "$(git rev-parse HEAD)" --title "Win11Debloat-CN 2026.07.11-zh-CN.1" --notes-file RELEASE.zh-CN.md
          fi

          rm -f "$archive" .github/workflows/bootstrap-source.yml
          rmdir .github/workflows 2>/dev/null || true
          git add --all
          if ! git diff --cached --quiet; then
            git commit -m "Remove temporary release bootstrap"
            git push origin HEAD:main
          fi
